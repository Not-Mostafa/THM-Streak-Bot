name: TryHackMe Streak Bot

on:
  schedule:
    # Egypt switches between UTC+2 and UTC+3. The guard below runs only at 04:00 Africa/Cairo.
    - cron: '34 2 * * *'
    - cron: '30 5 * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: tryhackme-streak-bot
  cancel-in-progress: false

jobs:
  maintain-streak:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Check Egypt execution time
        id: schedule_guard
        shell: bash
        run: |
          echo "should_run=true" >> "$GITHUB_OUTPUT"
          

      - name: Set up Python
        if: steps.schedule_guard.outputs.should_run == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        if: steps.schedule_guard.outputs.should_run == 'true'
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          seleniumbase install chromedriver

      - name: Run tests
        if: steps.schedule_guard.outputs.should_run == 'true'
        run: python -m unittest discover -s tests -v

      - name: Run bot
        if: steps.schedule_guard.outputs.should_run == 'true'
        env:
          AUTH_COOKIES: ${{ secrets.AUTH_COOKIES }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          DISCORD_USER_ID: ${{ secrets.DISCORD_USER_ID }}
        run: python main.py

      - name: Upload diagnostics
        if: always() && steps.schedule_guard.outputs.should_run == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: thm-bot-logs
          path: |
            tryhackmebot.log
            *.png
            *_page_state.json
          retention-days: 7
          if-no-files-found: warn
