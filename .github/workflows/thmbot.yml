name: TryHackMe Streak Bot

on:
  schedule:
    # Egypt switches between UTC+2 and UTC+3. The guard below runs only at 04:00 Africa/Cairo.
    - cron: '0 1 * * *'
    - cron: '0 2 * * *'
  workflow_dispatch: # Allows manual verification testing execution track

jobs:
  maintain-streak:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check Egypt execution time
        id: schedule_guard
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" || "$(TZ=Africa/Cairo date +%H)" == "04" ]]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Python Environment
        if: steps.schedule_guard.outputs.should_run == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install System Utilities and Core Libraries
        if: steps.schedule_guard.outputs.should_run == 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install Stealth Framework Dependencies
        if: steps.schedule_guard.outputs.should_run == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # Installs matching chromium dependencies natively for Ubuntu runner instances
          seleniumbase install chromedriver

      - name: Run THM Bot Execution Script
        if: steps.schedule_guard.outputs.should_run == 'true'
        env:
          AUTH_COOKIES: ${{ secrets.AUTH_COOKIES }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          DISCORD_USER_ID: ${{ secrets.DISCORD_USER_ID }}
          THM_EMAIL: ${{ secrets.THM_EMAIL }}
          THM_PASSWORD: ${{ secrets.THM_PASSWORD }}
        run: |
          timeout 10m python main.py
        continue-on-error: true

      - name: Upload Run Performance Artifacts
        if: steps.schedule_guard.outputs.should_run == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: thm-bot-logs
          path: |
            tryhackmebot.log
            *.png
          retention-days: 7
